name: Build BNM Android Arm64

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. NDK ───────────────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      # ── 3. Tools ─────────────────────────────────────────────────────────────
      - name: Install build tools
        run: sudo apt-get install -y ninja-build cmake

      # ── 4. Configure ─────────────────────────────────────────────────────────
      # BNM_LINK_LOG=OFF  - don't link liblog (matches the default in CMakeLists)
      # UNITY_VER=6000    - selects the 6000.1.7f1 il2cpp headers in
      #                     Il2CppHeaders.hpp via the #elif UNITY_VER >= 6000 branch
      - name: Configure CMake
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B build \
            -S . \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DBNM_LINK_LOG=OFF \
            -DUNITY_VER=6000

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 6. Upload ────────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BNM-arm64-v8a
          path: build/libBNM.a
          if-no-files-found: error
